[package]
name = "bytesmith-protocols"
description = "Feature-gated zero-copy parsers for common network protocols, generated from bytesmith DSL specs"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
repository.workspace = true
readme.workspace = true
license.workspace = true
keywords = ["network", "protocols", "parser", "zero-copy", "packet"]
categories = ["parsing", "network-programming", "encoding"]

[dependencies]
bytesmith = { path = "../bytesmith", version = "0.1.0" }

[build-dependencies]
bytesmith-dsl-parse = { path = "../bytesmith-dsl-parse", version = "0.1.0" }
bytesmith-codegen = { path = "../bytesmith-codegen", version = "0.1.0" }

[features]
default = []
ethernet = []
arp = []
vlan = []
ip = []
icmp = []
icmpv6 = []
udp = []
tcp = []
dns = []
tls = []
dhcp = []
sctp = []
bgp = []
mqtt_v3 = []
mqtt_v5 = []
mqtt = ["mqtt_v3", "mqtt_v5"]
all = [
    "ethernet",
    "arp",
    "vlan",
    "ip",
    "icmp",
    "icmpv6",
    "udp",
    "tcp",
    "dns",
    "tls",
    "dhcp",
    "sctp",
    "bgp",
    "mqtt",
]
