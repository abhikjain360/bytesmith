[package]
name = "binparse-protocols"
description = "Feature-gated zero-copy parsers for common network protocols, generated from binparse DSL specs"
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
binparse = { path = "../binparse", version = "0.1.0" }

[build-dependencies]
binparse-dsl-parse = { path = "../binparse-dsl-parse", version = "0.1.0" }
binparse-codegen = { path = "../binparse-codegen", version = "0.1.0" }

[features]
default = []
ethernet = []
arp = []
vlan = []
ip = []
icmp = []
icmpv6 = []
udp = []
tcp = []
dns = []
tls = []
dhcp = []
sctp = []
bgp = []
mqtt_v3 = []
mqtt_v5 = []
mqtt = ["mqtt_v3", "mqtt_v5"]
all = [
    "ethernet",
    "arp",
    "vlan",
    "ip",
    "icmp",
    "icmpv6",
    "udp",
    "tcp",
    "dns",
    "tls",
    "dhcp",
    "sctp",
    "bgp",
    "mqtt",
]
